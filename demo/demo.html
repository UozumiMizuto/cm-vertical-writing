<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Vertical Editor Demo - OSS Library</title>
    <style>
        @font-face {
            font-family: 'STVerticalMincho';
            src: url('/STVerticalMincho.ttf') format('truetype');
        }

        body {
            margin: 0;
            background: #0f1117;
            color: #fff;
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 16px 24px;
            background: #1a1d27;
            border-bottom: 2px solid #232734;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: #fa6400;
        }

        #container {
            flex: 1;
            position: relative;
            overflow: hidden;
            margin: 32px;
            border-radius: 8px;
            border: 1px solid #232734;
            background: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #wrapper {
            width: 100%;
            height: 100%;
            transform: rotate(90deg) translateY(-100%);
            transform-origin: top left;
        }

        .instructions {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        code {
            background: #232734;
            padding: 2px 4px;
            border-radius: 4px;
            color: #e2e8f0;
        }
    </style>
</head>

<body>
    <header>
        <h1>Vertical Editor Demo (Codemirror vertical writing)</h1>
        <div class="instructions">
            Font: <code>STVerticalMincho</code> (Rotated Zen Old Mincho)
        </div>
    </header>
    <div id="container">
        <div id="wrapper"></div>
    </div>
    <!-- Point to the local demo.ts -->
    <script type="module" src="./demo.ts"></script>
</body>

</html>
